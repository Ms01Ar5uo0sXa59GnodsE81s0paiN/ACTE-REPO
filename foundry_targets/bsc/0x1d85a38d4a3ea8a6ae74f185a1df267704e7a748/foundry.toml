[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.22"
optimizer = true
optimizer_runs = 2000
evm_version = "paris"
remappings = [
  "@openzeppelin/contracts-upgradeable/=src/@openzeppelin/contracts-upgradeable/",
  "@openzeppelin/contracts/=src/@openzeppelin/contracts/",
  "contracts/=src/contracts/",
]
