name: 0 Intake Address

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/0_intake_address.yml"
  workflow_dispatch:
    inputs:
      chain:
        description: "Chain key for raw address input"
        required: true
        default: "bsc"
      address:
        description: "Raw address or explorer URL"
        required: true
      proxy_address:
        description: "Optional proxy address or explorer URL. Leave blank for implementation/direct-only targets."
        required: false
        default: ""
      implementation_address:
        description: "Optional implementation address or explorer URL. Use with a proxy when already known."
        required: false
        default: ""
      label:
        description: "Human-readable label"
        required: false
        default: ""
      protocol:
        description: "Protocol/project name"
        required: false
        default: ""
      target_type:
        description: "contract, token, pool, vault, proxy, reward_pool"
        required: false
        default: "contract"

permissions:
  contents: write

jobs:
  index:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow indexed for manual runs."

  intake:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Register target
        run: |
          python3 scripts/run_intake_address.py \
            --chain "${{ inputs.chain }}" \
            --address "${{ inputs.address }}" \
            --proxy-address "${{ inputs.proxy_address }}" \
            --implementation-address "${{ inputs.implementation_address }}" \
            --label "${{ inputs.label }}" \
            --protocol "${{ inputs.protocol }}" \
            --target-type "${{ inputs.target_type }}"

      - name: Commit target state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f setup targets
          git commit -m "ACTE intake target" || echo "No changes to commit"
          git pull --rebase origin master || git pull --rebase origin main || true
          git push
