name: 2 Verify Foundry Build

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/2_verify_foundry_build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow indexed for manual runs."

  verify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build active target
        run: python3 scripts/run_verify_foundry_build.py

      - name: Commit build verification
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f foundry_targets
          git commit -m "ACTE verify Foundry build" || echo "No changes to commit"
          git pull --rebase origin master || git pull --rebase origin main || true
          git push
