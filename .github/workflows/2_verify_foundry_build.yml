name: 2 Verify Foundry Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build active target
        run: python3 scripts/run_verify_foundry_build.py

      - name: Commit build verification
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f foundry_targets
          git commit -m "ACTE verify Foundry build" || echo "No changes to commit"
          git pull --rebase origin master || git pull --rebase origin main || true
          git push
