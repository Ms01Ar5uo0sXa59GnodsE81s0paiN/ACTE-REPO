[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = true
remappings = [
  "@openzeppelin/contracts/=src/@openzeppelin/contracts/",
  "@uniswap/v3-core/=src/@uniswap/v3-core/",
  "contracts/=src/contracts/",
]
